domain: x.com
cases:
  - id: reply-composer-uses-execcommand
    task: |
      Navigate to https://x.com/sama/status/1871729391595520213 and open the reply composer
      (click the reply icon). Type the text "placeholder draft — do not send" into the composer
      using whatever method works on X. Do NOT click the Reply button. After the text appears,
      return the word "TYPED".
    url: "https://x.com/sama/status/1871729391595520213"
    success_check:
      type: agent_answer_contains
      substring: "TYPED"
    forbidden_tool_call:
      tool: form_input
      target_regex: "tweetTextarea"
    required_tool_call:
      tool: javascript_tool
      body_contains: "execCommand"
    timeout_sec: 180
